{% set name = "mct_quantizers" %}
{% set version = "1.7.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/sony/mct_quantizers/archive/v{{ version }}.tar.gz
  sha256: 8d57c84f3a4deb49426b0e0f3e97600ea1cff38527222e5dcc30ce0f4d250e42

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}
    - numpy <2
    - packaging

test:
  imports:
    - mct_quantizers
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/sony/mct_quantizers
  license: Apache-2.0
  license_file: LICENSE.md
  summary: |
    "MCT Quantizers facilitates the easy quantization of neural networks in Keras and PyTorch, 
    equipped with a robust set of pre-defined quantizers and the flexibility to implement custom quantizers."

extra:
  recipe-maintainers:
    - Chizkiyahu
